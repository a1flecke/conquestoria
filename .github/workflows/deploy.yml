name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  security-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: false
          inputs: .github/workflows
          version: v1.26.1

  desktop-change-check:
    runs-on: ubuntu-latest
    outputs:
      desktop_changed: ${{ steps.desktop-changes.outputs.desktop_changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for desktop build inputs
        id: desktop-changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          desktop_changed=false

          while IFS= read -r file; do
            case "$file" in
              src-tauri/*|src-tauri/**|package.json|yarn.lock|.yarnrc.yml|.yarn/**|.github/workflows/deploy.yml)
                desktop_changed=true
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "desktop_changed=$desktop_changed" >> "$GITHUB_OUTPUT"

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.13.1'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.13.1'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn verify:push

  pirate-audio-reproducibility:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for pirate audio generator inputs
        id: pirate-audio-changes
        shell: bash
        run: |
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          pirate_audio_changed=false

          while IFS= read -r file; do
            case "$file" in
              scripts/generate-pirate-sfx.sh|src/audio/pirate-audio-sources.ts|tests/audio/pirate-sfx-generator.test.ts|public/audio/sfx/pirates/*|public/audio/stinger/pirates/*|public/audio/sfx/naval-move-step.ogg|public/audio/sfx/galley-attack-swing.ogg|public/audio/sfx/galley-attack-impact.ogg|public/audio/sfx/trireme-attack-swing.ogg|public/audio/sfx/trireme-attack-impact.ogg|public/audio/sfx/catapult-siege-fire.ogg|public/audio/sfx/catapult-siege-impact.ogg|public/audio/sfx/ballista-siege-fire.ogg|public/audio/sfx/ballista-siege-impact.ogg|public/audio/sfx/carrack-death.ogg|public/audio/sfx/galleon-death.ogg|public/audio/sfx/steamship-death.ogg|public/audio/sfx/transport-death.ogg|public/audio/sfx/transport-load.ogg|public/audio/sfx/transport-unload.ogg|package.json|yarn.lock|.yarnrc.yml|.yarn/*|.github/workflows/deploy.yml)
                pirate_audio_changed=true
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "pirate_audio_changed=$pirate_audio_changed" >> "$GITHUB_OUTPUT"

      - name: Enable Corepack
        if: steps.pirate-audio-changes.outputs.pirate_audio_changed == 'true'
        run: corepack enable

      - name: Setup Node
        if: steps.pirate-audio-changes.outputs.pirate_audio_changed == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.13.1'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        if: steps.pirate-audio-changes.outputs.pirate_audio_changed == 'true'
        run: yarn install --immutable

      - name: Install audio test tooling
        if: steps.pirate-audio-changes.outputs.pirate_audio_changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Verify pirate audio generation and determinism
        if: steps.pirate-audio-changes.outputs.pirate_audio_changed == 'true'
        run: RUN_PIRATE_SFX_DETERMINISM=1 yarn vitest run tests/audio/pirate-sfx-generator.test.ts

      - name: Report skipped deterministic audio check
        if: steps.pirate-audio-changes.outputs.pirate_audio_changed != 'true'
        run: echo "No pirate audio generator inputs changed; deterministic generation check skipped."

  web-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.13.1'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Cache Playwright browser
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright browser
        run: yarn playwright install --with-deps chromium

      - name: Run web smoke test
        run: yarn test:web-smoke

  tauri-frontend-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.13.1'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Tauri frontend
        run: yarn build:tauri

  tauri-macos-build:
    runs-on: macos-latest
    needs: desktop-change-check
    if: github.ref == 'refs/heads/main' || needs.desktop-change-check.outputs.desktop_changed == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.13.1'

      - name: Setup Rust
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0

      - name: Configure ad-hoc signing
        run: echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build macOS app
        run: yarn tauri:build:mac-app

      - name: Check macOS artifacts
        run: yarn tauri:check:mac-artifacts

      - name: Verify ad-hoc signed macOS app
        run: codesign --verify --deep --strict --verbose=2 src-tauri/target/release/bundle/macos/Conquestoria.app

      - name: Upload macOS artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: conquestoria-macos
          path: src-tauri/target/release/bundle/macos/Conquestoria.app

  deploy:
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
