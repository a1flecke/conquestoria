<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1050" viewBox="0 0 1440 1050">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0d14"/>
      <stop offset="1" stop-color="#171b2d"/>
    </linearGradient>
    <style>
      .title { font: 800 38px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f7eedc; }
      .sub { font: 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #c7beae; }
      .head { font: 800 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f4d188; }
      .body { font: 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #e8e0cf; }
      .small { font: 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #bdb4a2; }
      .chip { font: 800 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f8f1df; }
      .button { font: 800 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #211607; }
    </style>
  </defs>
  <rect width="1440" height="1050" fill="url(#bg)"/>
  <rect x="50" y="42" width="1340" height="966" rx="24" fill="rgba(15,15,25,.92)" stroke="rgba(255,255,255,.13)"/>

  <text x="90" y="103" class="title">🏛️ Wonder Ambitions</text>
  <text x="90" y="138" class="sub">Dashboard mode: prioritize, compare, and act without opening every card.</text>
  <rect x="1170" y="70" width="160" height="46" rx="12" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.22)"/>
  <text x="1216" y="100" class="body">Close</text>

  <rect x="90" y="176" width="1248" height="84" rx="18" fill="rgba(232,193,112,.10)" stroke="rgba(232,193,112,.24)"/>
  <text x="122" y="213" class="head">Recommended action</text>
  <text x="122" y="240" class="body">Oracle of Delphi is ready. Starting now preserves queued production and begins the race.</text>
  <rect x="1064" y="196" width="210" height="44" rx="22" fill="#e8c170"/>
  <text x="1100" y="224" class="button">Start Oracle</text>

  <rect x="90" y="292" width="1248" height="550" rx="18" fill="rgba(255,255,255,.045)" stroke="rgba(255,255,255,.12)"/>
  <rect x="90" y="292" width="1248" height="58" rx="18" fill="rgba(255,255,255,.06)"/>
  <text x="122" y="327" class="head">Wonder</text>
  <text x="428" y="327" class="head">Status</text>
  <text x="622" y="327" class="head">Quest</text>
  <text x="790" y="327" class="head">Missing / risk</text>
  <text x="1140" y="327" class="head">Action</text>

  <line x1="90" y1="350" x2="1338" y2="350" stroke="rgba(255,255,255,.13)"/>
  <g>
    <rect x="90" y="350" width="1248" height="94" fill="rgba(232,193,112,.07)"/>
    <text x="122" y="389" class="body">🔮 Oracle of Delphi</text>
    <text x="122" y="416" class="small">Reward: shrine science and prophecy</text>
    <rect x="428" y="375" width="116" height="30" rx="15" fill="rgba(122,216,143,.20)" stroke="rgba(122,216,143,.50)"/>
    <text x="448" y="395" class="chip">READY</text>
    <text x="622" y="395" class="body">3 / 3</text>
    <text x="790" y="395" class="body">No rival pressure</text>
    <rect x="1120" y="370" width="148" height="42" rx="21" fill="#e8c170"/>
    <text x="1152" y="397" class="button">Start</text>
  </g>

  <line x1="90" y1="444" x2="1338" y2="444" stroke="rgba(255,255,255,.10)"/>
  <g>
    <text x="122" y="489" class="body">🌊 Grand Canal</text>
    <text x="122" y="516" class="small">Reward: trade-route engine</text>
    <rect x="428" y="475" width="128" height="30" rx="15" fill="rgba(215,173,88,.20)" stroke="rgba(215,173,88,.50)"/>
    <text x="448" y="495" class="chip">QUESTING</text>
    <text x="622" y="495" class="body">2 / 3</text>
    <text x="790" y="495" class="body">Need second trade route</text>
    <rect x="1120" y="470" width="148" height="42" rx="21" fill="rgba(255,255,255,.08)" stroke="rgba(232,193,112,.45)"/>
    <text x="1150" y="497" class="body">Details</text>
  </g>

  <line x1="90" y1="538" x2="1338" y2="538" stroke="rgba(255,255,255,.10)"/>
  <g>
    <text x="122" y="583" class="body">📚 World Archive</text>
    <text x="122" y="610" class="small">Reward: empire research memory</text>
    <rect x="428" y="569" width="146" height="30" rx="15" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)"/>
    <text x="448" y="589" class="chip">AVAILABLE SOON</text>
    <text x="622" y="589" class="body">1 / 3</text>
    <text x="790" y="589" class="body">Printing, Diplomats</text>
    <rect x="1120" y="564" width="148" height="42" rx="21" fill="rgba(255,255,255,.08)" stroke="rgba(232,193,112,.45)"/>
    <text x="1150" y="591" class="body">Details</text>
  </g>

  <line x1="90" y1="632" x2="1338" y2="632" stroke="rgba(255,255,255,.10)"/>
  <g>
    <text x="122" y="677" class="body">🗿 Colossus</text>
    <text x="122" y="704" class="small">Reward: maritime trade dominance</text>
    <rect x="428" y="663" width="96" height="30" rx="15" fill="rgba(224,114,114,.18)" stroke="rgba(224,114,114,.45)"/>
    <text x="448" y="683" class="chip">BLOCKED</text>
    <text x="622" y="683" class="body">0 / 3</text>
    <text x="790" y="683" class="body">Needs coastal harbor city</text>
    <rect x="1120" y="658" width="148" height="42" rx="21" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.16)"/>
    <text x="1150" y="685" class="small">Explain</text>
  </g>

  <rect x="90" y="884" width="388" height="72" rx="18" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.12)"/>
  <text x="120" y="923" class="body">Good for power users and late games.</text>
  <text x="120" y="947" class="small">Risk: less magical, less readable on small screens.</text>

  <rect x="526" y="884" width="388" height="72" rx="18" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.12)"/>
  <text x="556" y="923" class="body">Keeps every ambition reachable.</text>
  <text x="556" y="947" class="small">Recommendation row does not hide lower-ranked items.</text>

  <rect x="950" y="884" width="388" height="72" rx="18" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.12)"/>
  <text x="980" y="923" class="body">Best as a secondary “all” view.</text>
  <text x="980" y="947" class="small">Could pair with guided cards as the primary surface.</text>
</svg>
