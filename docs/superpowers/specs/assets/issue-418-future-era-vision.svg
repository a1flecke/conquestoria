<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Era 13 foundations and future-era vision</title>
  <desc id="desc">Era 13 Autonomous Systems leads to Era 14 Emergent Intelligence, Era 15 Planetary Coordination, Era 16 Plural Societies, and Era 17 plus Solar Horizons. A second lane shows civilization and world evolution every three eras.</desc>
  <defs><marker id="f" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#7f99b3"/></marker></defs>
  <rect width="1200" height="560" rx="24" fill="#0b1220"/>
  <text x="56" y="55" fill="#f5f7fb" font-family="system-ui,sans-serif" font-size="26" font-weight="600">A foundation for different futures — not an endless ladder of bigger numbers</text>
  <g stroke="#7f99b3" stroke-width="3" fill="none" marker-end="url(#f)"><path d="M266 200 H290"/><path d="M486 200 H510"/><path d="M706 200 H730"/><path d="M926 200 H950"/></g>
  <g font-family="system-ui,sans-serif" text-anchor="middle">
    <g><rect x="70" y="112" width="196" height="176" rx="18" fill="#17364a" stroke="#5db7de"/><text x="168" y="149" fill="#78d6ff" font-size="18" font-weight="600">ERA 13</text><text x="168" y="178" fill="#f5f7fb" font-size="17">Autonomous Systems</text><text x="168" y="214" fill="#cbd9e5" font-size="14">Plans · Capacity · Surge</text><text x="168" y="239" fill="#cbd9e5" font-size="14">bounded strain</text><text x="168" y="270" fill="#82e6c8" font-size="13">EMERGING</text></g>
    <g><rect x="290" y="112" width="196" height="176" rx="18" fill="#27304b" stroke="#a897ff"/><text x="388" y="149" fill="#b7aaff" font-size="18" font-weight="600">ERA 14</text><text x="388" y="178" fill="#f5f7fb" font-size="17">Emergent Intelligence</text><text x="388" y="214" fill="#d7d0ed" font-size="14">Charters · audits</text><text x="388" y="239" fill="#d7d0ed" font-size="14">agent proposals</text><text x="388" y="270" fill="#ffc078" font-size="13">SPECULATIVE</text></g>
    <g><rect x="510" y="112" width="196" height="176" rx="18" fill="#1f3a39" stroke="#65d0b0"/><text x="608" y="149" fill="#82e6c8" font-size="18" font-weight="600">ERA 15</text><text x="608" y="178" fill="#f5f7fb" font-size="17">Planetary Coordination</text><text x="608" y="214" fill="#cbe7df" font-size="14">Treaties · shared systems</text><text x="608" y="239" fill="#cbe7df" font-size="14">interdependence</text><text x="608" y="270" fill="#ffc078" font-size="13">SPECULATIVE</text></g>
    <g><rect x="730" y="112" width="196" height="176" rx="18" fill="#3a3030" stroke="#f1a45b"/><text x="828" y="149" fill="#ffc078" font-size="18" font-weight="600">ERA 16</text><text x="828" y="178" fill="#f5f7fb" font-size="17">Plural Societies</text><text x="828" y="214" fill="#eedbd1" font-size="14">Citizenship · coexistence</text><text x="828" y="239" fill="#eedbd1" font-size="14">distinct development paths</text><text x="828" y="270" fill="#ffc078" font-size="13">SPECULATIVE</text></g>
    <g><rect x="950" y="112" width="196" height="176" rx="18" fill="#302c43" stroke="#9c8df2"/><text x="1048" y="149" fill="#c4baff" font-size="18" font-weight="600">ERA 17+</text><text x="1048" y="178" fill="#f5f7fb" font-size="17">Solar Horizons</text><text x="1048" y="214" fill="#ddd7ef" font-size="14">Only with an honest</text><text x="1048" y="239" fill="#ddd7ef" font-size="14">space representation</text><text x="1048" y="270" fill="#ffc078" font-size="13">SPECULATIVE</text></g>
  </g>
  <text x="58" y="355" fill="#f5f7fb" font-family="system-ui,sans-serif" font-size="21" font-weight="600">Every three eras, civilizations and the living world evolve together</text>
  <line x1="92" y1="430" x2="1100" y2="430" stroke="#657e96" stroke-width="4"/>
  <g font-family="system-ui,sans-serif" text-anchor="middle">
    <g><circle cx="180" cy="430" r="14" fill="#5db7de"/><text x="180" y="397" fill="#dff5ff" font-size="15" font-weight="600">ERA 4</text></g>
    <g><circle cx="400" cy="430" r="14" fill="#7bb7df"/><text x="400" y="397" fill="#dff5ff" font-size="15" font-weight="600">ERA 7</text></g>
    <g><circle cx="620" cy="430" r="14" fill="#a897ff"/><text x="620" y="397" fill="#eee9ff" font-size="15" font-weight="600">ERA 10</text></g>
    <g><circle cx="840" cy="430" r="14" fill="#65d0b0"/><text x="840" y="397" fill="#e5fff7" font-size="15" font-weight="600">ERA 13</text></g>
    <g><circle cx="1060" cy="430" r="14" fill="#f1a45b"/><text x="1060" y="397" fill="#fff0dc" font-size="15" font-weight="600">ERA 16</text></g>
  </g>
  <rect x="92" y="466" width="1008" height="54" rx="16" fill="#172335"/>
  <text x="596" y="489" text-anchor="middle" fill="#f5f7fb" font-family="system-ui,sans-serif" font-size="15">Civilization choices · barbarians · beasts · pirates · crises · revolutionary movements · minor powers</text>
  <text x="596" y="510" text-anchor="middle" fill="#aebed0" font-family="system-ui,sans-serif" font-size="13">New goals and behaviors, not merely more health and damage</text>
</svg>
