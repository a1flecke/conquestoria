<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Specialist intent assignment flow</title>
  <desc id="desc">Four-step interface: choose constructive or hostile intent, tap a valid highlighted target, review outcome and counter, then confirm once for a persistent plan.</desc>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#819bb4"/></marker></defs>
  <rect width="1200" height="430" rx="24" fill="#0b1220"/>
  <text x="58" y="58" fill="#f5f7fb" font-family="system-ui,sans-serif" font-size="26" font-weight="600">Assign once; the plan persists</text>
  <g stroke="#819bb4" stroke-width="3" fill="none" marker-end="url(#arr)"><path d="M290 235 H350"/><path d="M570 235 H630"/><path d="M850 235 H910"/></g>
  <g font-family="system-ui,sans-serif">
    <g><rect x="70" y="118" width="220" height="234" rx="20" fill="#16283b" stroke="#5db7de"/><text x="95" y="155" fill="#78d6ff" font-size="16" font-weight="600">1 · CHOOSE INTENT</text><rect x="95" y="181" width="170" height="44" rx="12" fill="#1d493e"/><text x="180" y="208" text-anchor="middle" fill="#e4fff6" font-size="14">Constructive · Rally</text><rect x="95" y="239" width="170" height="44" rx="12" fill="#3b2830"/><text x="180" y="266" text-anchor="middle" fill="#ffe4ee" font-size="14">Hostile · Undermine</text><text x="95" y="319" fill="#aebed0" font-size="13">All actions remain reachable</text></g>
    <g><rect x="350" y="118" width="220" height="234" rx="20" fill="#16283b" stroke="#7bb7df"/><text x="375" y="155" fill="#8ed0ff" font-size="16" font-weight="600">2 · TAP TARGET</text><polygon points="460,184 497,205 497,247 460,268 423,247 423,205" fill="#29445a" stroke="#78d6ff" stroke-width="3"/><circle cx="460" cy="226" r="9" fill="#78d6ff"/><text x="460" y="304" text-anchor="middle" fill="#f5f7fb" font-size="14">Valid targets are highlighted</text><text x="460" y="326" text-anchor="middle" fill="#aebed0" font-size="13">No hover required</text></g>
    <g><rect x="630" y="118" width="220" height="234" rx="20" fill="#20263b" stroke="#a897ff"/><text x="655" y="155" fill="#b7aaff" font-size="16" font-weight="600">3 · PREVIEW</text><text x="655" y="190" fill="#f5f7fb" font-size="14">Effect: +1 pressure</text><text x="655" y="218" fill="#f5f7fb" font-size="14">Load: 2</text><text x="655" y="246" fill="#f5f7fb" font-size="14">First result: target turn end</text><text x="655" y="274" fill="#f5f7fb" font-size="14">Counter: Civic Media Forum</text><text x="655" y="302" fill="#f5f7fb" font-size="14">Source: may be detected</text><text x="655" y="330" fill="#d0c8df" font-size="13">Surge: +2 · 2 rounds strain</text></g>
    <g><rect x="910" y="118" width="220" height="234" rx="20" fill="#1b3532" stroke="#65d0b0"/><text x="935" y="155" fill="#82e6c8" font-size="16" font-weight="600">4 · CONFIRM ONCE</text><rect x="945" y="196" width="150" height="54" rx="14" fill="#356957"/><text x="1020" y="229" text-anchor="middle" fill="#f1fff9" font-size="16" font-weight="600">ASSIGN PLAN</text><text x="1020" y="291" text-anchor="middle" fill="#f5f7fb" font-size="14">Runs until changed, invalid,</text><text x="1020" y="314" text-anchor="middle" fill="#d0e3dd" font-size="14">blocked, or completed</text></g>
  </g>
</svg>
