<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Industrial-to-future resource progression</title>
  <desc id="desc">Timeline from Era 7 through Era 13 showing Coal, Oil, Aluminum, Uranium, Rare Earth Elements, and Battery Minerals, with hard and soft resource behavior.</desc>
  <rect width="1200" height="460" rx="24" fill="#0b1220"/>
  <text x="55" y="52" fill="#f5f7fb" font-family="system-ui,sans-serif" font-size="25" font-weight="600">Material history becomes strategic geography</text>
  <text x="55" y="81" fill="#aebed0" font-family="system-ui,sans-serif" font-size="16">Distinct electronic and battery supply chains create different trade decisions.</text>
  <line x1="80" y1="213" x2="1120" y2="213" stroke="#6f87a0" stroke-width="4"/>
  <g font-family="system-ui,sans-serif" text-anchor="middle">
    <g><circle cx="120" cy="213" r="12" fill="#87909a"/><text x="120" y="139" fill="#f5f7fb" font-size="17" font-weight="600">COAL</text><text x="120" y="166" fill="#aebed0" font-size="13">Era 7 · Steam</text><rect x="48" y="244" width="144" height="82" rx="13" fill="#182635"/><text x="120" y="274" fill="#d6e0ea" font-size="13">Factories · rail</text><text x="120" y="298" fill="#d6e0ea" font-size="13">steam fleets</text><text x="120" y="350" fill="#82e6c8" font-size="12">SOFT</text></g>
    <g><circle cx="312" cy="213" r="12" fill="#c99a52"/><text x="312" y="139" fill="#f5f7fb" font-size="17" font-weight="600">OIL</text><text x="312" y="166" fill="#aebed0" font-size="13">Era 9 · Petroleum</text><rect x="240" y="244" width="144" height="82" rx="13" fill="#2a241d"/><text x="312" y="274" fill="#f1e1c7" font-size="13">Refineries · tanks</text><text x="312" y="298" fill="#f1e1c7" font-size="13">aircraft</text><text x="312" y="350" fill="#ffc078" font-size="12">HARD + SOFT</text></g>
    <g><circle cx="504" cy="213" r="12" fill="#b9c6d4"/><text x="504" y="139" fill="#f5f7fb" font-size="17" font-weight="600">ALUMINUM</text><text x="504" y="166" fill="#aebed0" font-size="13">Era 9 · Smelting</text><rect x="432" y="244" width="144" height="82" rx="13" fill="#202b37"/><text x="504" y="274" fill="#dce7f2" font-size="13">Aviation</text><text x="504" y="298" fill="#dce7f2" font-size="13">aerospace</text><text x="504" y="350" fill="#82e6c8" font-size="12">SOFT</text></g>
    <g><circle cx="696" cy="213" r="12" fill="#8bd27e"/><text x="696" y="139" fill="#f5f7fb" font-size="17" font-weight="600">URANIUM</text><text x="696" y="166" fill="#aebed0" font-size="13">Era 10 · Physics</text><rect x="624" y="244" width="144" height="82" rx="13" fill="#1d3026"/><text x="696" y="274" fill="#d8f0dc" font-size="13">Reactors · arsenals</text><text x="696" y="298" fill="#d8f0dc" font-size="13">strategic submarines</text><text x="696" y="350" fill="#ffc078" font-size="12">HARD</text></g>
    <g><circle cx="888" cy="213" r="12" fill="#9c8df2"/><text x="888" y="132" fill="#f5f7fb" font-size="16" font-weight="600">RARE EARTH</text><text x="888" y="151" fill="#f5f7fb" font-size="16" font-weight="600">ELEMENTS</text><text x="888" y="176" fill="#aebed0" font-size="13">Era 12 · Nano</text><rect x="816" y="244" width="144" height="82" rx="13" fill="#272443"/><text x="888" y="274" fill="#e4defe" font-size="13">Sensors · motors</text><text x="888" y="298" fill="#e4defe" font-size="13">network hardware</text><text x="888" y="350" fill="#82e6c8" font-size="12">SOFT</text></g>
    <g><circle cx="1080" cy="213" r="12" fill="#65d0b0"/><text x="1080" y="132" fill="#f5f7fb" font-size="16" font-weight="600">BATTERY</text><text x="1080" y="151" fill="#f5f7fb" font-size="16" font-weight="600">MINERALS</text><text x="1080" y="176" fill="#aebed0" font-size="13">Era 12 · Smart Cities</text><rect x="1008" y="244" width="144" height="82" rx="13" fill="#1c3935"/><text x="1080" y="274" fill="#d8f3eb" font-size="13">Storage · drones</text><text x="1080" y="298" fill="#d8f3eb" font-size="13">exosuits · mobility</text><text x="1080" y="350" fill="#82e6c8" font-size="12">SOFT</text></g>
  </g>
  <text x="600" y="407" text-anchor="middle" fill="#aebed0" font-family="system-ui,sans-serif" font-size="14">Access comes from improved land, outposts, trade, or marketplace purchase — no stockpile bookkeeping.</text>
  <text x="600" y="431" text-anchor="middle" fill="#8196aa" font-family="system-ui,sans-serif" font-size="13">Rare Earth Elements and Battery Minerals never substitute for each other unless a chosen circular-manufacturing effect says so.</text>
</svg>
